name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.8"
      - name: Ruff check
        run: ruff check benchlens scripts
      - name: Ruff format check
        run: ruff format --check benchlens scripts

  test:
    name: Tests (pytest + Postgres 16)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: benchlens
          POSTGRES_USER: benchlens
          POSTGRES_PASSWORD: benchlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U benchlens"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: benchlens
      POSTGRES_USER: benchlens
      POSTGRES_PASSWORD: benchlens
      JWT_SECRET: ci-secret-not-for-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Bootstrap the warehouse
        run: benchlens db bootstrap
      - name: Run pytest
        run: pytest -ra --cov=benchlens --cov-report=term-missing

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: benchlens:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
